<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Satguru CRM</title>
  <link rel="stylesheet" href="assets/crm-ui.css"/>
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand-block">
      <div class="brand-mark">SG</div>
      <div class="brand-copy">
        <h1>Satguru CRM</h1>
        <p>Main Workspace</p>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-title">Overview</div>
      <ul class="nav-list">
        <li>
          <a href="home.html" class="nav-link active">
            <span class="nav-icon">🏠</span>
            Dashboard
          </a>
        </li>
      </ul>
    </div>

    <div class="nav-group">
      <div class="nav-title">Sales</div>
      <ul class="nav-list">
        <li><a href="leads.html" class="nav-link">📊 Leads</a></li>
        <li><a href="accounts.html" class="nav-link">🏢 Accounts</a></li>
        <li><a href="contacts.html" class="nav-link">👤 Contacts</a></li>
      </ul>
    </div>

    <div class="nav-group">
      <div class="nav-title">Admin</div>
      <ul class="nav-list">
        <li><a href="users.html" class="nav-link">🧑‍💼 Users</a></li>
      </ul>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Header -->
    <div class="topbar">
      <div class="page-heading">
        <h2>Dashboard</h2>
        <p>Welcome to your CRM</p>
      </div>

      <div class="topbar-right">
        <input class="input" placeholder="Search..." />
        <button class="primary-btn">+ New Lead</button>
      </div>
    </div>

    <!-- Content -->
    <div class="page-body">

      <div class="stats-grid">
        <div class="card">
          <div class="stat-label">Total Leads</div>
          <div class="stat-value">128</div>
        </div>

        <div class="card">
          <div class="stat-label">Accounts</div>
          <div class="stat-value">52</div>
        </div>

        <div class="card">
          <div class="stat-label">Users</div>
          <div class="stat-value">14</div>
        </div>

        <div class="card">
          <div class="stat-label">Follow-ups</div>
          <div class="stat-value">21</div>
        </div>
      </div>

    </div>

  </main>

</div>

<script src="assets/crm-ui.js"></script>
</body>
</html>
