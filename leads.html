<!DOCTYPE html>
<html>
<head>
  <title>Leads - Satguru CRM</title>
</head>

<body style="font-family: Arial; margin: 0;">

  <div style="background-color: #333; color: white; padding: 15px;">
    <h2>Satguru CRM</h2>
  </div>

  <div style="display: flex;">

    <div style="width: 200px; background-color: #f4f4f4; padding: 20px; height: 100vh;">
      <h3>Menu</h3>
      <ul style="list-style: none; padding: 0;">
        <li><a href="home.html">Dashboard</a></li>
        <li><a href="leads.html">Leads</a></li>
        <li>Accounts</li>
        <li>Contacts</li>
      </ul>

      <br>

      <a href="index.html">
        <button>Logout</button>
      </a>
    </div>

    <div style="flex: 1; padding: 20px;">
      <h1>Leads Page</h1>

      <h3>Add New Lead</h3>

      <form onsubmit="addLead(event)">
        <input type="text" id="leadName" placeholder="Lead Name" required><br><br>

        <input type="text" id="companyName" placeholder="Company Name" required><br><br>

        <select id="leadStatus" required>
          <option value="">Select Status</option>
          <option>New</option>
          <option>Follow-up</option>
          <option>Converted</option>
        </select><br><br>

        <button type="submit">Add Lead</button>
      </form>

      <hr>

      <p>Here we will manage all leads.</p>

      <table border="1" cellpadding="10" cellspacing="0" id="leadsTable">
        <tr>
          <th>Lead Name</th>
          <th>Company</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
        <tr>
          <td>John Doe</td>
          <td>ABC Travels</td>
          <td>New</td>
          <td><button onclick="deleteLead(this)">Delete</button></td>
        </tr>
        <tr>
          <td>Mary Smith</td>
          <td>XYZ Corp</td>
          <td>Follow-up</td>
          <td><button onclick="deleteLead(this)">Delete</button></td>
        </tr>
      </table>
    </div>

  </div>

  <script>
    function addLead(event) {
      event.preventDefault();

      var leadName = document.getElementById("leadName").value;
      var companyName = document.getElementById("companyName").value;
      var leadStatus = document.getElementById("leadStatus").value;

      var table = document.getElementById("leadsTable");

      var newRow = table.insertRow(-1);

      var cell1 = newRow.insertCell(0);
      var cell2 = newRow.insertCell(1);
      var cell3 = newRow.insertCell(2);

      cell1.innerHTML = leadName;
      cell2.innerHTML = companyName;
      cell3.innerHTML = leadStatus;
      var cell4 = newRow.insertCell(3);
      cell4.innerHTML = '<button onclick="deleteLead(this)">Delete</button>';

      document.getElementById("leadName").value = "";
      document.getElementById("companyName").value = "";
      document.getElementById("leadStatus").value = "";
    }
      function deleteLead(button) {
      var row = button.parentNode.parentNode;
      row.remove();
      }
  </script>

</body>
</html>
