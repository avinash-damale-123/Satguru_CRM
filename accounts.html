<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts - Satguru CRM</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    a { text-decoration: none; }

    .app { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #0f172a, #1e293b);
      color: white;
      padding: 24px 18px;
      position: fixed;
      top: 0;
      bottom: 0;
    }

    .brand h2 { font-size: 24px; }
    .brand small { color: #94a3b8; }

    .nav { list-style: none; margin-top: 20px; }
    .nav li { margin-bottom: 10px; }

    .nav a {
      display: block;
      padding: 12px;
      border-radius: 10px;
      color: #e2e8f0;
    }

    .nav a.active {
      background: #2563eb;
      color: white;
    }

    .logout-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: red;
      color: white;
      border: none;
      border-radius: 10px;
    }

    /* Main */
    .main {
      margin-left: 250px;
      width: 100%;
    }

    .topbar {
      background: white;
      padding: 15px 20px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
    }

    .content {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .input, .select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .btn-edit { background: lightblue; }
    .btn-delete { background: pink; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

  </style>
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">
      <h2>Satguru CRM</h2>
      <small>Accounts</small>
    </div>

    <ul class="nav">
      <li><a href="home.html">Dashboard</a></li>
      <li><a href="leads.html">Leads</a></li>
      <li><a href="users.html">Users</a></li>
      <li><a href="accounts.html" class="active">Accounts</a></li>
    </ul>

    <a href="index.html">
      <button class="logout-btn">Logout</button>
    </a>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <div>
        <h2>Accounts Management</h2>
      </div>

      <div>
        <b>Admin</b>
      </div>
    </div>

    <div class="content">

      <!-- Form -->
      <div class="card">
        <h3>Add / Edit Account</h3>

        <form onsubmit="addAccount(event)">
          <input class="input" type="text" id="accountName" placeholder="Account Name" required>
          <input class="input" type="text" id="companyName" placeholder="Company Name" required>

          <select class="select" id="accountType" required>
            <option value="">Select Type</option>
            <option>NCA</option>
            <option>ERV</option>
            <option>B2B</option>
          </select>

          <button type="submit">Save</button>
        </form>
      </div>

      <!-- Search -->
      <div class="card">
        <input type="text" id="searchBox" placeholder="Search..." onkeyup="searchAccounts()">
      </div>

      <!-- Table -->
      <div class="card">
        <table id="accountsTable">
          <tr>
            <th>Name</th>
            <th>Company</th>
            <th>Type</th>
            <th>Action</th>
          </tr>

          <tr>
            <td>ABC Corporate</td>
            <td>ABC Travels</td>
            <td>NCA</td>
            <td>
              <button class="btn-edit" onclick="editAccount(this)">Edit</button>
              <button class="btn-delete" onclick="deleteAccount(this)">Delete</button>
            </td>
          </tr>

        </table>
      </div>

    </div>
  </div>
</div>

<script>

function addAccount(event) {
  event.preventDefault();

  var name = document.getElementById("accountName").value;
  var company = document.getElementById("companyName").value;
  var type = document.getElementById("accountType").value;

  var table = document.getElementById("accountsTable");
  var row = table.insertRow(-1);

  row.insertCell(0).innerHTML = name;
  row.insertCell(1).innerHTML = company;
  row.insertCell(2).innerHTML = type;

  row.insertCell(3).innerHTML = `
    <button onclick="editAccount(this)">Edit</button>
    <button onclick="deleteAccount(this)">Delete</button>
  `;

  clearForm();
}

function deleteAccount(btn) {
  btn.parentNode.parentNode.remove();
}

function editAccount(btn) {
  var row = btn.parentNode.parentNode;

  document.getElementById("accountName").value = row.cells[0].innerText;
  document.getElementById("companyName").value = row.cells[1].innerText;
  document.getElementById("accountType").value = row.cells[2].innerText;

  row.remove();
}

function clearForm() {
  document.getElementById("accountName").value = "";
  document.getElementById("companyName").value = "";
  document.getElementById("accountType").value = "";
}

function searchAccounts() {
  var input = document.getElementById("searchBox").value.toLowerCase();
  var rows = document.getElementById("accountsTable").rows;

  for (var i = 1; i < rows.length; i++) {
    var text = rows[i].innerText.toLowerCase();

    if (text.includes(input)) {
      rows[i].style.display = "";
    } else {
      rows[i].style.display = "none";
    }
  }
}

</script>

</body>
</html>
