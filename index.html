<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satguru CRM Login</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/plane-fix.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZSW1VHFYW4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZSW1VHFYW4');
  </script>
</head>
<body class="auth-page auth-v2">
  <div class="login-plane-wrap" aria-hidden="true">
    <div class="login-plane">
      <div class="plane-ribbon">Satguru CRM</div>
      <div class="plane-shape">✈</div>
    </div>
    <div class="flight-path"></div>
    <div class="runway-line"></div>
  </div>

  <main class="auth-shell" aria-label="Satguru CRM secure login">
    <section class="auth-panel" aria-live="polite">
      <section class="auth-card" id="loginCard" aria-labelledby="loginTitle">
        <div class="logo-wrap">
          <img src="assets/satguru-travel-logo.jpg" alt="Satguru Travel" class="satguru-logo" />
        </div>
        <div class="login-divider"></div>
        <div class="auth-heading">
          <h1 id="loginTitle">Satguru CRM Login</h1>
          <p>Welcome back! Sign in to access your CRM dashboard.</p>
        </div>

        <div id="loginStatus" class="status-box" role="status"></div>
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="loginEmail">Username / Email <span class="required">*</span></label>
            <div class="input-shell">
              <span class="field-icon" aria-hidden="true">♙</span>
              <input class="input" id="loginEmail" name="email" type="text" inputmode="email" autocomplete="username" placeholder="Enter username or email" required aria-describedby="loginEmailError" />
            </div>
            <p class="field-error" id="loginEmailError"></p>
          </div>

          <div class="form-group">
            <label for="loginPassword">Password <span class="required">*</span></label>
            <div class="input-shell">
              <span class="field-icon" aria-hidden="true">▣</span>
              <input class="input" id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="Enter password" required aria-describedby="loginPasswordError" />
              <button class="password-toggle" type="button" id="togglePassword" aria-label="Show password">Show</button>
            </div>
            <p class="field-error" id="loginPasswordError"></p>
          </div>

          <div class="row-between">
            <label class="remember-wrap"><input type="checkbox" id="rememberMe" /> <span>Remember me</span></label>
            <button class="link-btn" type="button" id="forgotToggle">Forgot Password?</button>
          </div>

          <button class="primary-btn auth-submit" id="loginSubmit" type="submit">
            <span class="btn-spinner" aria-hidden="true"></span><span class="btn-label">Log In</span>
          </button>
        </form>

        <div class="auth-or"><span>or</span></div>
        <div class="access-note">
          <span>New user?</span>
          <button class="link-btn request-link" type="button" id="requestAccessToggle">Request access</button>
          <span>from admin</span>
        </div>
        <p class="security-note"><span aria-hidden="true">▱</span> Protected login <span class="dot-sep">|</span> Authorized users only</p>
      </section>

      <section class="auth-card hidden" id="forgotCard" aria-labelledby="forgotTitle">
        <button class="back-link" type="button" data-back-login>← Back to login</button>
        <h2 id="forgotTitle">Forgot Password</h2>
        <p class="auth-copy">Enter your work email. If an account exists, password reset instructions will be sent.</p>
        <div id="forgotStatus" class="status-box" role="status"></div>
        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label for="forgotEmail">Work Email <span class="required">*</span></label>
            <div class="input-shell"><span class="field-icon" aria-hidden="true">✉</span><input class="input" id="forgotEmail" type="email" autocomplete="email" placeholder="Enter work email" required aria-describedby="forgotEmailError" /></div>
            <p class="field-error" id="forgotEmailError"></p>
          </div>
          <button class="primary-btn" type="submit">Send Reset Link</button>
        </form>
      </section>
    </section>
  </main>
  <script src="assets/app.js"></script>
  <script>
    (function(){
      const form = document.getElementById('loginForm');
      const email = document.getElementById('loginEmail');
      const password = document.getElementById('loginPassword');
      const status = document.getElementById('loginStatus');
      const toggle = document.getElementById('togglePassword');
      const forgot = document.getElementById('forgotToggle');
      const request = document.getElementById('requestAccessToggle');
      const forgotCard = document.getElementById('forgotCard');
      const loginCard = document.getElementById('loginCard');

      if (toggle) {
        toggle.addEventListener('click', function(){
          const isHidden = password.type === 'password';
          password.type = isHidden ? 'text' : 'password';
          toggle.textContent = isHidden ? 'Hide' : 'Show';
        });
      }

      if (forgot) {
        forgot.addEventListener('click', function(){
          loginCard.classList.add('hidden');
          forgotCard.classList.remove('hidden');
        });
      }

      document.querySelectorAll('[data-back-login]').forEach(function(btn){
        btn.addEventListener('click', function(){
          forgotCard.classList.add('hidden');
          loginCard.classList.remove('hidden');
        });
      });

      if (request) {
        request.addEventListener('click', function(){
          alert('Access request flow will be connected with admin approval in the next phase.');
        });
      }

      if (form) {
        form.addEventListener('submit', function(event){
          event.preventDefault();
          const userValue = email.value.trim();
          const passValue = password.value.trim();
          if (!userValue || !passValue) {
            status.className = 'status-box error';
            status.textContent = 'Please enter username/email and password.';
            return;
          }
          status.className = 'status-box success';
          status.textContent = 'Login successful. Opening CRM workspace...';
          setTimeout(function(){ window.location.href = 'home.html'; }, 350);
        });
      }
    })();
  </script>
</body>
</html>
